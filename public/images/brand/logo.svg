<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Virtual Ventures logo</title>
  <desc id="desc">A warm leather and gold Virtual Ventures crest with two letter Vs and a small star.</desc>
  <defs>
    <radialGradient id="leatherGlow" cx="34%" cy="22%" r="78%">
      <stop offset="0%" stop-color="#ffe1a3"/>
      <stop offset="18%" stop-color="#b8793f"/>
      <stop offset="58%" stop-color="#4a2c19"/>
      <stop offset="100%" stop-color="#160c07"/>
    </radialGradient>
    <linearGradient id="gold" x1="88" x2="424" y1="70" y2="444" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff1bf"/>
      <stop offset="36%" stop-color="#efbd72"/>
      <stop offset="72%" stop-color="#9f632f"/>
      <stop offset="100%" stop-color="#ffe1a3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#000000" flood-opacity="0.42"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#efbd72" flood-opacity="0.34"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="232" fill="url(#leatherGlow)"/>
  <circle cx="256" cy="256" r="214" fill="none" stroke="#efbd72" stroke-width="9"/>
  <circle cx="256" cy="256" r="188" fill="none" stroke="#f7d28a" stroke-width="3" stroke-dasharray="5 12" opacity="0.72"/>

  <path d="M122 150 L204 360 L255 218 L306 360 L390 150" fill="none" stroke="url(#gold)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" filter="url(#softShadow)"/>
  <path d="M122 150 L204 360 L255 218 L306 360 L390 150" fill="none" stroke="#fff7df" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <path d="M256 86 L271 128 L313 143 L271 158 L256 200 L241 158 L199 143 L241 128 Z" fill="url(#gold)" filter="url(#softShadow)"/>
  <circle cx="256" cy="256" r="238" fill="none" stroke="#fff6e5" stroke-width="2" opacity="0.22"/>
</svg>
